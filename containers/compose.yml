services:
  redis:
    image: redis:7-alpine
    container_name: play-realtime-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--notify-keyspace-events", "Ex"]
    restart: unless-stopped

  backend-a:
    build:
      context: ..
      dockerfile: containers/Dockerfile
    container_name: play-realtime-backend-a
    environment:
      PORT: 4000
      FRONTEND_ORIGIN: http://localhost:3000
      STORAGE_DRIVER: redis
      REDIS_URL: redis://redis:6379
      ROOM_GRACE_MS: 30000
      COOKIE_SAME_SITE: lax
      COOKIE_SECURE: "false"
      COOKIE_PARTITIONED: "false"
    ports:
      - "4001:4000"
    depends_on:
      - redis
    restart: unless-stopped

  backend-b:
    build:
      context: ..
      dockerfile: containers/Dockerfile
    container_name: play-realtime-backend-b
    environment:
      PORT: 4000
      FRONTEND_ORIGIN: http://localhost:3000
      STORAGE_DRIVER: redis
      REDIS_URL: redis://redis:6379
      ROOM_GRACE_MS: 30000
      COOKIE_SAME_SITE: lax
      COOKIE_SECURE: "false"
      COOKIE_PARTITIONED: "false"
    ports:
      - "4002:4000"
    depends_on:
      - redis
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: play-realtime-nginx
    ports:
      - "4000:4000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-a
      - backend-b
    restart: unless-stopped
