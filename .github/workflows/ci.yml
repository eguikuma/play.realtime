name: 検証

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: 検証ジョブ
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: リポジトリの取得
        uses: actions/checkout@v4

      - name: pnpm のセットアップ
        uses: pnpm/action-setup@v4

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 依存パッケージの導入
        run: pnpm install --frozen-lockfile

      - name: 静的解析
        run: pnpm run lint

      - name: 共有パッケージのビルド
        run: pnpm -F @play.realtime/contracts -F @play.realtime/transport-protocol run build

      - name: 型検証とテスト
        run: pnpm run verify && pnpm run test

      - name: バックエンドのビルド
        run: pnpm -F @play.realtime/backend run build

      - name: フロントエンドのビルド
        run: pnpm -F @play.realtime/frontend run build
